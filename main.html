<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Main Dashboard</title>
<link rel="stylesheet" href="style.css">
<!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="main-page">

<div class="main-container">
    <!-- SIDEBAR -->
    <aside class="sidebar">
    <div class="logo">
        <h2>Menu</h2>
    </div>
    <nav class="menu">
        <button class="menu-btn" onclick="loadPage('dashboard.html')">
            <i class="bi bi-house-door"></i> <span class="menu-text">Dashboard</span>
        </button>
        <button class="menu-btn" onclick="loadPage('item.html')">
            <i class="bi bi-box"></i> <span class="menu-text">Items</span>
        </button>
        <button class="menu-btn" onclick="loadPage('borrowed.html')">
            <i class="bi bi-card-list"></i> <span class="menu-text">Borrow Items</span>
        </button>
    </nav>
    <button class="logout-btn" onclick="logout()">
        <i class="bi bi-box-arrow-right"></i> <span class="menu-text">Logout</span>
    </button>
</aside>

    <!-- MAIN CONTENT -->
    <div class="content">
        <header class="topbar">
            <h2>Welcome, <span id="username">Admin</span></h2>
        </header>
        <!-- CONTENT LOADER -->
        <div class="page-content">
            <iframe id="contentFrame" src="dashboard.html"></iframe>
        </div>
    </div>
</div>

<script>
function loadPage(page){
    document.getElementById("contentFrame").src = page;
}
function logout(){
    let confirmLogout = confirm("Are you sure you want to logout?");
    if(confirmLogout){
        window.location.href = "login.html";
    }
}
</script>

</body>
</html>
