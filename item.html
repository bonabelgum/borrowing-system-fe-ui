<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Items</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- QR Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link rel="stylesheet" href="item.css">
</head>
<body>

<div class="header">
    <h1>Hello Items</h1>
    <div class="search-container">
        <div class="search-box">
            <i class="fa fa-search"></i>
            <input type="text" placeholder="Search items..." id="itemSearch">
        </div>
        <button class="scan-btn">Scan</button>
    </div>
</div>
<!-- Camera Modal -->
<div class="modal fade" id="cameraModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content" style="border-radius:15px;">
            <div class="modal-header">
                <h5 class="modal-title">Scan QR Code</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <div id="reader" style="width:100%;"></div>
            </div>
        </div>
    </div>
</div>
<!--category-->
<div class="category-section">
    <!--div class="category-label">Category:</div-->
    <div class="category-bar-container" id="categoryBar">
        <!-- Add button -->
        <button id="addCategoryBtn"><i class="fa fa-plus"></i> Add category</button>
        <!-- All button -->
        <button id="allCategoryBtn" class="category-btn">All</button>
        <!-- Existing buttons -->
        <button class="category-btn">Electronics</button>
        <button class="category-btn">Tools</button>
    </div>
</div>
<!-- Content for selected category -->
<div class="category-content" id="categoryContent" style="display:none;">
    <div class="tools-container">
        <!-- Add Tool Box -->
        <div class="tool-card add-tool" id="addToolBtn">
            <i class="fa fa-plus"></i>
            <span>Add Tool</span>
        </div>
        <!-- Existing tools will be injected here -->
    </div>
</div>

<!-- Modal -->
<div id="toolModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3>Add New Tool</h3>
        <input type="text" id="toolName" placeholder="Tool Name">
        <input type="number" id="toolQuantity" placeholder="Quantity">
        <input type="file" id="toolImage">
        <button id="saveTool">Save</button>
    </div>
</div>
<!-- Tool Detail Page -->
<div class="tool-detail-page" id="toolDetailPage" style="display:none;">

    <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
        <!-- Back button -->
        <button id="backToCategory" class="back-btn">
            <i class="fa fa-arrow-left"></i>
        </button>
        <div class="add-family-wrapper" style="display:flex; align-items:center; gap:10px;">
            
            <span id="toolDetailNameDisplay"
                  style="display:inline-flex; font-weight:bold; display:flex; align-items:center; font-size:20px; color:#193B68;">
            </span>

            <input type="number" id="familyAddCount" min="1" placeholder="Number"
                   style="width:90px; padding:4px 6px; height:36px; box-sizing:border-box; border-radius:10px;">

            <button id="addFamilyMemberBtn" class="add-family-btn" style="padding:6px 10px;">
                <i class="fa fa-plus"></i> Add Tools
            </button>
        </div>
    </div>

    <!-- Quantity & Borrowed -->
    <div class="tool-detail-actions" style="display:flex; gap:20px; margin-bottom:10px;">
        <div>Quantity: <span id="toolDetailQuantity"></span></div>
        <div>Borrowed: <span id="toolDetailBorrowed"></span></div>
    </div>

    <!-- Family members -->
    <div class="family-container" id="familyContainer"></div>

    <button id="deleteToolBtn" class="delete-btn"><i class="fa fa-trash"></i> Delete this tool</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const addBtn = document.getElementById('addCategoryBtn');
    const allBtn = document.getElementById('allCategoryBtn');
    const categoryBar = document.getElementById('categoryBar');
    const contentArea = document.getElementById('categoryContent');
    document.addEventListener("DOMContentLoaded", () => {
    // Show all tools by default on page load, excluding the "Add Tool" button
    allBtn.click();
});
/*CAMERA*/
let html5QrCode;

document.querySelector(".scan-btn").addEventListener("click", () => {
    const modal = new bootstrap.Modal(document.getElementById('cameraModal'));
    modal.show();

    setTimeout(() => {
        html5QrCode = new Html5Qrcode("reader");

        html5QrCode.start(
            { facingMode: "environment" },
            {
                fps: 10,
                qrbox: { width: 250, height: 250 }
            },
            (decodedText) => {
                alert("QR Code: " + decodedText);
                html5QrCode.stop();
                modal.hide();
            },
            (errorMessage) => {
                // ignore scan errors
            }
        );
    }, 500);
});

// Stop camera when modal is closed
document.getElementById('cameraModal').addEventListener('hidden.bs.modal', () => {
    if (html5QrCode) {
        html5QrCode.stop().catch(err => console.log(err));
    }
});

    function updateCategoryButtons() {
        const buttons = Array.from(categoryBar.querySelectorAll('.category-btn'));
        buttons.sort((a, b) => a.textContent.localeCompare(b.textContent));
        buttons.forEach(btn => categoryBar.removeChild(btn));
        buttons.forEach(btn => categoryBar.appendChild(btn));
    }

    addBtn.addEventListener('click', () => {
        let newCategory = prompt("What is the name of the new category?");
        if(newCategory){
            newCategory = newCategory.trim();
            if(newCategory === "") return;

            const existing = Array.from(categoryBar.querySelectorAll('.category-btn'))
                .some(btn => btn.textContent.toLowerCase() === newCategory.toLowerCase());
            if(existing){
                alert("This category already exists!");
                return;
            }

            const btn = document.createElement('button');
            btn.classList.add('category-btn');
            btn.textContent = newCategory;
            categoryBar.appendChild(btn);
            updateCategoryButtons();
            attachCategoryClick(btn);
        }
    });

    function attachCategoryClick(button){
        button.addEventListener('click', () => {
            // Hide tool detail page when switching categories
            document.getElementById('toolDetailPage').style.display = 'none';

            // Show the category content area
            contentArea.style.display = 'block';

            // Update the current category and render tools
            currentCategory = button.textContent;
            renderTools(currentCategory);
        });
    }

    document.querySelectorAll('.category-btn').forEach(btn => attachCategoryClick(btn));
    //contents
    const toolsContainer = document.querySelector('.tools-container');

    const toolModal = document.getElementById('toolModal');
    const addToolBtn = document.getElementById('addToolBtn');
    const closeModal = document.querySelector('.close');
    const saveToolBtn = document.getElementById('saveTool');

    let currentCategory = "";
    // Example initial tools data
    const toolsData = {
    Electronics: [
        {
            name: "Cable",
            quantity: 3,
            borrowed: 2,
            image: "assets/cable.jpg",
            family: [
                { name: "Cable 1", id: "ID-1001xxxxxxxx-x" },
                { name: "Cable 2", id: "ID-1002xxxxxxxx-x" },
                { name: "Cable 3", id: "ID-1003xxxxxxxx-x" }
            ]
        }
    ],
    Tools: [
        {
            name: "Phillip Screwdriver",
            quantity: 2,
            borrowed: 1,
            image: "assets/screw1.jpg",
            family: [
                { name: "Phillip Screwdriver 1", id: "ID-2001xxxxxxxx-x" },
                { name: "Phillip Screwdriver 2", id: "ID-2001xxxxxxxx-x" }
            ]
        },
        {
            name: "Flat Screwdriver",
            quantity: 3,
            borrowed: 0,
            image: "assets/screw2.jpg",
            family: [
                { name: "Flat Screwdriver 1", id: "ID-2001xxxxxxxx-x" },
                { name: "Flat Screwdriver 2", id: "ID-2001xxxxxxxx-x" },
                { name: "Flat Screwdriver 3", id: "ID-2001xxxxxxxx-x" }
            ]
        }
    ]
};
    /*function renderTools(category){
        toolsContainer.innerHTML = `
            <div class="tool-card add-tool" id="addToolBtn">
                <i class="fa fa-plus"></i>
                <span>Add Tool</span>
            </div>
        `;
        if(toolsData[category]){
            toolsData[category].forEach(tool => {
                const card = document.createElement('div');
                card.className = 'tool-card';
                card.innerHTML = `
                    ${tool.image ? `<img src="${tool.image}" alt="${tool.name}">` : `<div class="no-image">No picture added</div>`}
                    <div>${tool.name}</div>
                    <div class="clickable">Quantity: ${tool.quantity}</div>
                    <div class="clickable">Borrowed: ${tool.borrowed}</div>
                `;
                card.addEventListener('click', () => {
                    alert(`Tool: ${tool.name}`);
                });
                toolsContainer.appendChild(card);
            });
        }

        document.getElementById('addToolBtn').addEventListener('click', () => {
            toolModal.style.display = 'flex';
        });
    }*/

    // Modal events
    closeModal.onclick = () => toolModal.style.display = 'none';
    window.onclick = (e) => { if(e.target == toolModal) toolModal.style.display = 'none'; }

    saveToolBtn.onclick = () => {
        const name = document.getElementById('toolName').value;
        const quantity = document.getElementById('toolQuantity').value;
        const imageFile = document.getElementById('toolImage').files[0];

        if(!name || !quantity) return alert("Fill all fields");

        if(imageFile){
            const reader = new FileReader();
            reader.onload = function(e){
                const newTool = {name, quantity, borrowed: 0, image: e.target.result};
                if(!toolsData[currentCategory]) toolsData[currentCategory] = [];
                toolsData[currentCategory].push(newTool);
                renderTools(currentCategory);
                toolModal.style.display = 'none';
            }
            reader.readAsDataURL(imageFile);
        } else {
            // If no image uploaded, use placeholder text
            const newTool = {name, quantity, borrowed: 0, image: null};
            if(!toolsData[currentCategory]) toolsData[currentCategory] = [];
            toolsData[currentCategory].push(newTool);
            renderTools(currentCategory);
            toolModal.style.display = 'none';
        }
    };
//tools
    let currentTool = null;

    // When clicking a tool card, show tool detail page
function renderTools(category){
    toolsContainer.innerHTML = `
        <div class="tool-card add-tool" id="addToolBtn">
            <i class="fa fa-plus"></i>
            <span>Add Tool</span>
        </div>
    `;
    if(toolsData[category]){
        toolsData[category].forEach((tool, index) => {
            const card = document.createElement('div');
            card.className = 'tool-card';
            card.innerHTML = `
                ${tool.image ? `<img src="${tool.image}" alt="${tool.name}">` : `<div class="no-image">No picture added</div>`}
                <div>${tool.name}</div>
                <div class="clickable">Quantity: ${tool.quantity}</div>
                <div class="clickable">Borrowed: ${tool.borrowed}</div>
            `;
            // Attach the same click event to each card to show the tool's detail page
            card.addEventListener('click', () => openToolDetail(category, index));
            toolsContainer.appendChild(card);
        });
    }

    document.getElementById('addToolBtn').addEventListener('click', () => {
        toolModal.style.display = 'flex';
    });
}

// When "All" button is clicked, render all tools from all categories
allBtn.addEventListener('click', () => {
    // Clear the tools container and render only the existing tools
    toolsContainer.innerHTML = '';  // Remove all existing content

    // Render all tools from all categories
    Object.keys(toolsData).forEach(category => {
        toolsData[category].forEach((tool, index) => {
            const card = document.createElement('div');
            card.className = 'tool-card';
            card.innerHTML = `
                ${tool.image ? `<img src="${tool.image}" alt="${tool.name}">` : `<div class="no-image">No picture added</div>`}
                <div>${tool.name}</div>
                <div class="clickable">Quantity: ${tool.quantity}</div>
                <div class="clickable">Borrowed: ${tool.borrowed}</div>
            `;
            // Attach the same click event to each card to show the tool's detail page
            card.addEventListener('click', () => openToolDetail(category, index));
            toolsContainer.appendChild(card);
        });
    });

    // Show the "All" button's action (to display all tools)
    contentArea.style.display = 'block';
});
// Open tool detail page
    function openToolDetail(category, toolIndex){
    currentTool = {category, toolIndex};
    const tool = toolsData[category][toolIndex];
    document.getElementById('toolDetailPage').style.display = 'block';
    contentArea.style.display = 'none';
    // Display tool name to the left of input
    document.getElementById('toolDetailNameDisplay').textContent = tool.name;
    // Quantity & Borrowed
    document.getElementById('toolDetailQuantity').textContent = tool.quantity;
    document.getElementById('toolDetailBorrowed').textContent = tool.borrowed;

    renderFamily(tool);
}
// Add family member
    document.getElementById('addFamilyMemberBtn').addEventListener('click', () => {
    if(!currentTool) return;

    const tool = toolsData[currentTool.category][currentTool.toolIndex];
    if(!tool.family) tool.family = [];
    const countInput = document.getElementById('familyAddCount');
    const value = countInput.value.trim();
    const count = Number(value);
    // Validate input
    if(!value || isNaN(count) || count <= 0){
        alert("Please enter a valid number greater than 0");
        return;
    }
    // Optional: Ask for confirmation
    const confirmAdd = confirm(`Are you sure you want to add ${count} family member(s) to "${tool.name}"?`);
    if(!confirmAdd) return;
    // Add family members
    for(let i = 0; i < count; i++){
        const memberNumber = tool.family.length + 1;
        const id = `ID-${Date.now()}-${i}`;
        tool.family.push({name:`${tool.name} ${memberNumber}`, id});
    }
    renderFamily(tool);
    countInput.value = '';
});

    // Render family members
    function renderFamily(tool) {
        const container = document.getElementById('familyContainer');
        container.innerHTML = '';  // Clear existing family members
        
        if (!tool.family) tool.family = [];  // Ensure tool family array exists

        tool.family.forEach((member, index) => {
            const div = document.createElement('div');
            div.className = 'family-member';
            div.innerHTML = `
                <img src="assets/qr.png" alt="QR Code">
                <div class="family-member-name">${member.name}</div>
                <div>ID: ${member.id}</div>
            `;

            // Attach click event to the entire family member card
            div.addEventListener('click', () => openFamilyMemberModal(member, index));

            container.appendChild(div);
        });
    }

    //DELETE
    const deleteToolBtn = document.getElementById('deleteToolBtn');
    deleteToolBtn.addEventListener('click', () => {
        if(!currentTool) return;

        const tool = toolsData[currentTool.category][currentTool.toolIndex];
        const confirmDelete = confirm(`Are you sure you want to delete "${tool.name}"?`);
        if(confirmDelete){
            // Remove the tool from toolsData
            toolsData[currentTool.category].splice(currentTool.toolIndex, 1);

            // Hide the detail page and go back to category view
            document.getElementById('toolDetailPage').style.display = 'none';
            contentArea.style.display = 'block';

            // Re-render the tools in that category
            renderTools(currentTool.category);
        }
    });

    // Back button
    document.getElementById('backToCategory').addEventListener('click', () => {
        document.getElementById('toolDetailPage').style.display = 'none';
        contentArea.style.display = 'block';
    });
    document.getElementById('closeFamilyModal').addEventListener('click', () => {
        familyModal.style.display = 'none';
    });
    document.getElementById('saveFamily').addEventListener('click', () => {
        const name = document.getElementById('familyName').value || "Unnamed";
        const quantity = document.getElementById('familyQuantity').value || 1;
        const tool = toolsData[currentTool.category][currentTool.toolIndex];
        if(!tool.family) tool.family = [];
        const id = `ID-${Date.now()}`; // unique ID
        tool.family.push({name, quantity, id});
        renderFamily(tool);
        familyModal.style.display = 'none';
        document.getElementById('familyName').value = '';
        document.getElementById('familyQuantity').value = '';
    });
// family modal 
function openFamilyMemberModal(member, index) {
    // Check if modal exists, if not, create it dynamically
    let modal = document.getElementById('familyMemberModal');
    
    if (!modal) {
        modal = document.createElement('div');
        modal.id = 'familyMemberModal';
        modal.className = 'modal'; // Adding modal class
        document.body.appendChild(modal);  // Add modal to the body
    }

    // Set modal content specific to the clicked family member
    modal.innerHTML = `
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-header">
                <h3>Family Member Details</h3>
            </div>
            <div class="modal-body">
                <div class="modal-image">
                    <img src="assets/qr.png" alt="QR Code">
                </div>
                <form id="familyMemberForm">
                    <div><strong>Name:</strong> <input type="text" value="${member.name}" id="modalName"></div>
                    <div><strong>ID:</strong> <input type="text" value="${member.id}" id="modalId"></div>
                    <div><strong>Quantity:</strong> <input type="number" value="${member.quantity || 1}" id="modalQuantity"></div>
                    <div><strong>Condition:</strong> <input type="text" value="${member.condition || ''}" id="modalCondition"></div>
                    <div><strong>Status:</strong>
                        <select id="modalStatus">
                            <option value="borrowed" ${member.status === 'borrowed' ? 'selected' : ''}>Borrowed</option>
                            <option value="returned" ${member.status === 'returned' ? 'selected' : ''}>Returned</option>
                        </select>
                    </div>
                </form>
                <button id="deleteButton" class="delete-btn">Delete</button> <!-- Delete button -->
                <button id="editButton" class="edit-btn">Edit</button> <!-- Edit button -->
            </div>
        </div>
    `;

    // Close modal when close button is clicked
    modal.querySelector('.close').addEventListener('click', () => {
        modal.style.display = 'none';
    });

    // Close modal when clicked outside the modal content
    window.onclick = (e) => {
        if (e.target == modal) {
            modal.style.display = 'none';
        }
    };

    // Edit button functionality
    const editButton = modal.querySelector('#editButton');
    editButton.addEventListener('click', () => {
        const name = document.getElementById('modalName').value;
        const id = document.getElementById('modalId').value;
        const quantity = document.getElementById('modalQuantity').value;
        const condition = document.getElementById('modalCondition').value;
        const status = document.getElementById('modalStatus').value;

        // Update the family member object with the new values
        member.name = name;
        member.id = id;
        member.quantity = quantity;
        member.condition = condition;
        member.status = status;

        // Optionally, re-render family members list if needed
        renderFamily(tool);  // Assuming you want to re-render the family list
    });

    // Delete button functionality
    const deleteButton = modal.querySelector('#deleteButton');
    deleteButton.addEventListener('click', () => {
        const confirmDelete = confirm(`Are you sure you want to delete "${member.name}"?`);
        if (confirmDelete) {
            // Remove the family member
            tool.family.splice(index, 1);  // Remove member from the array
            modal.style.display = 'none';  // Close the modal

            // Optionally, re-render the family members list after deletion
            renderFamily(tool);  // Re-render family members
        }
    });

    // Show the modal
    modal.style.display = 'block';
}
</script>

</body>
</html>
